<!DOCTYPE html>
<html lang="pt-BR">

<meta charset="UTF-8">

<title>EstoquePRO — Gestão de Varejo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1e2333;
    --card: #232840;
    --border: #2e3550;
    --accent: #4f8ef7;
    --accent2: #38d9a9;
    --accent3: #f7a14f;
    --danger: #f75f5f;
    --text: #e8ecf5;
    --text2: #8b93b0;
    --text3: #525d7e;
    --shadow: 0 4px 32px #0006;
    --radius: 14px;
    --radius2: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  h1,h2,h3,h4 { font-family: 'Space Grotesk', sans-serif; }

  /* ======= UTILS ======= */
  .hidden { display: none !important; }
  .flex { display: flex; }
  .flex-col { flex-direction: column; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .gap-4 { gap: 16px; }
  .w-full { width: 100%; }
  .text-sm { font-size: 13px; }
  .text-xs { font-size: 11px; }
  .fw-600 { font-weight: 600; }
  .color-accent { color: var(--accent); }
  .color-green { color: var(--accent2); }
  .color-orange { color: var(--accent3); }
  .color-red { color: var(--danger); }
  .color-muted { color: var(--text2); }

  /* ======= BUTTONS ======= */
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 20px; border-radius: var(--radius2);
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px;
    border: none; cursor: pointer; transition: all .18s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3a79e8; }
  .btn-success { background: var(--accent2); color: #0f1117; }
  .btn-success:hover { background: #2ec99a; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #e04a4a; }
  .btn-orange { background: var(--accent3); color: #0f1117; }
  .btn-orange:hover { background: #e89440; }
  .btn-ghost {
    background: transparent; color: var(--text2); border: 1.5px solid var(--border);
  }
  .btn-ghost:hover { background: var(--card); color: var(--text); }
  .btn-sm { padding: 6px 13px; font-size: 12px; }

  /* ======= INPUT ======= */
  .input {
    background: var(--bg2); border: 1.5px solid var(--border); border-radius: var(--radius2);
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    padding: 10px 14px; width: 100%; transition: border-color .18s;
    outline: none;
  }
  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: var(--text3); }
  .select { appearance: none; cursor: pointer; }
  label { font-size: 13px; color: var(--text2); font-weight: 500; margin-bottom: 5px; display: block; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }

  /* ======= LAYOUT ======= */
  #app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ======= LOGIN PAGE ======= */
  #page-login {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a2a4a 0%, var(--bg) 70%);
  }
  .login-card {
    background: var(--card); border: 1.5px solid var(--border); border-radius: 20px;
    padding: 48px 44px; width: 100%; max-width: 420px; box-shadow: var(--shadow);
  }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo .logo-mark {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; color: var(--text);
  }
  .logo-icon {
    width: 40px; height: 40px; background: var(--accent); border-radius: 10px;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .login-card h2 { font-size: 22px; margin-bottom: 6px; }
  .login-card p { color: var(--text2); font-size: 14px; margin-bottom: 28px; }
  .login-tab { display: flex; background: var(--bg2); border-radius: 10px; padding: 4px; margin-bottom: 28px; }
  .login-tab button {
    flex: 1; padding: 9px; border: none; background: transparent; color: var(--text2);
    font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 14px;
    border-radius: 8px; cursor: pointer; transition: all .18s;
  }
  .login-tab button.active { background: var(--card); color: var(--text); box-shadow: 0 2px 8px #0003; }
  .login-form { display: flex; flex-direction: column; gap: 16px; }
  .forgot { font-size: 13px; color: var(--accent); cursor: pointer; text-align: right; }
  .forgot:hover { text-decoration: underline; }

  /* ======= TOPBAR ======= */
  #topbar {
    background: var(--bg2); border-bottom: 1.5px solid var(--border);
    padding: 0 28px; height: 62px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
  }
  .topbar-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .topbar-logo span { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; }
  .topbar-logo .logo-icon { width: 34px; height: 34px; font-size: 16px; border-radius: 8px; }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .user-chip {
    display: flex; align-items: center; gap: 9px; background: var(--card);
    border: 1.5px solid var(--border); border-radius: 40px; padding: 6px 14px 6px 7px;
    cursor: pointer; transition: border-color .18s;
  }
  .user-chip:hover { border-color: var(--accent); }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700;
  }
  .user-chip span { font-size: 13px; font-weight: 600; }
  .notification-btn {
    width: 36px; height: 36px; background: var(--card); border: 1.5px solid var(--border);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; transition: border-color .18s; position: relative;
  }
  .notification-btn:hover { border-color: var(--accent); }
  .notif-badge {
    position: absolute; top: -4px; right: -4px; width: 16px; height: 16px;
    background: var(--danger); border-radius: 50%; font-size: 9px;
    display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff;
  }

  /* ======= SIDEBAR ======= */
  #layout { display: flex; flex: 1; }
  #sidebar {
    width: 220px; background: var(--bg2); border-right: 1.5px solid var(--border);
    padding: 20px 12px; display: flex; flex-direction: column; gap: 4px;
    min-height: calc(100vh - 62px); position: sticky; top: 62px; height: calc(100vh - 62px); overflow-y: auto;
  }
  .sidebar-section { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 1.2px; padding: 10px 8px 5px; text-transform: uppercase; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: var(--radius2); color: var(--text2); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all .18s; user-select: none; border: 1.5px solid transparent;
  }
  .nav-item:hover { background: var(--card); color: var(--text); }
  .nav-item.active { background: rgba(79,142,247,.12); color: var(--accent); border-color: rgba(79,142,247,.25); }
  .nav-item .icon { font-size: 17px; width: 22px; text-align: center; }
  .nav-item .badge {
    margin-left: auto; background: var(--danger); color: #fff; border-radius: 20px;
    font-size: 10px; font-weight: 700; padding: 2px 7px;
  }
  .sidebar-divider { height: 1px; background: var(--border); margin: 8px 0; }
  .logout-btn { margin-top: auto; }

  /* ======= MAIN ======= */
  #main { flex: 1; padding: 28px; overflow-y: auto; min-height: calc(100vh - 62px); }

  /* ======= PAGE HEADER ======= */
  .page-header { margin-bottom: 28px; }
  .page-header h1 { font-size: 26px; font-weight: 700; }
  .page-header p { color: var(--text2); font-size: 14px; margin-top: 4px; }
  .page-header-row { display: flex; align-items: center; justify-content: space-between; }

  /* ======= STAT CARDS ======= */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 22px 22px 18px; position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent-color, var(--accent));
  }
  .stat-card .stat-icon { font-size: 28px; margin-bottom: 10px; }
  .stat-card .stat-value { font-size: 30px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
  .stat-card .stat-label { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .stat-card .stat-change { font-size: 12px; margin-top: 8px; display: flex; align-items: center; gap: 4px; }

  /* ======= TABLE ======= */
  .table-wrap { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-header { padding: 18px 22px; border-bottom: 1.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .table-header h3 { font-size: 16px; }
  .table-filters { display: flex; gap: 10px; flex-wrap: wrap; }
  .search-box { position: relative; }
  .search-box input { padding-left: 36px; width: 220px; }
  .search-box .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; padding: 13px 16px; font-size: 11px; font-weight: 700;
    color: var(--text3); text-transform: uppercase; letter-spacing: .8px;
    background: var(--bg2); border-bottom: 1.5px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,.025); }
  tbody td { padding: 13px 16px; font-size: 14px; vertical-align: middle; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px;
    border-radius: 20px; font-size: 11px; font-weight: 700;
  }
  .badge-ok { background: rgba(56,217,169,.15); color: var(--accent2); }
  .badge-low { background: rgba(247,161,79,.15); color: var(--accent3); }
  .badge-empty { background: rgba(247,95,95,.15); color: var(--danger); }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .action-btns { display: flex; gap: 6px; }
  .icon-btn {
    width: 30px; height: 30px; border-radius: 7px; border: 1.5px solid var(--border);
    background: transparent; color: var(--text2); cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center; transition: all .15s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,.08); }
  .icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); background: rgba(247,95,95,.08); }

  /* ======= MODAL ======= */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 500;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    animation: fadeIn .18s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--bg3); border: 1.5px solid var(--border); border-radius: 18px;
    width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow); animation: slideUp .2s;
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { padding: 22px 26px 18px; border-bottom: 1.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-header h3 { font-size: 18px; }
  .modal-close { width: 32px; height: 32px; border-radius: 8px; background: var(--card); border: 1.5px solid var(--border); color: var(--text2); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .modal-close:hover { color: var(--danger); border-color: var(--danger); }
  .modal-body { padding: 26px; display: flex; flex-direction: column; gap: 16px; }
  .modal-footer { padding: 18px 26px 22px; border-top: 1.5px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* ======= CARDS ======= */
  .card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 22px; }

  /* ======= DASHBOARD CHART PLACEHOLDER ======= */
  .chart-area {
    background: var(--bg2); border-radius: var(--radius2); overflow: hidden; position: relative;
    height: 180px; display: flex; align-items: flex-end; gap: 8px; padding: 16px;
  }
  .chart-bar {
    flex: 1; border-radius: 6px 6px 0 0; background: var(--accent);
    opacity: .7; transition: opacity .18s; cursor: pointer;
    position: relative; min-width: 20px;
  }
  .chart-bar:hover { opacity: 1; }
  .chart-bar.green { background: var(--accent2); }

  /* ======= TABS ======= */
  .tabs { display: flex; gap: 4px; background: var(--bg2); padding: 4px; border-radius: 10px; width: fit-content; margin-bottom: 20px; }
  .tab { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .18s; color: var(--text2); border: 1.5px solid transparent; }
  .tab.active { background: var(--card); color: var(--text); box-shadow: 0 2px 8px #0003; }
  .tab:hover:not(.active) { color: var(--text); }

  /* ======= TOAST ======= */
  #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
  .toast {
    background: var(--card); border: 1.5px solid var(--border); border-radius: 12px;
    padding: 14px 18px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px;
    box-shadow: var(--shadow); animation: toastIn .25s; min-width: 280px;
  }
  @keyframes toastIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .toast.success { border-color: var(--accent2); }
  .toast.error { border-color: var(--danger); }
  .toast.warning { border-color: var(--accent3); }
  .toast-icon { font-size: 18px; }

  /* ======= SUPPLIER CARD ======= */
  .supplier-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .supplier-card {
    background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius);
    padding: 20px; transition: border-color .18s;
  }
  .supplier-card:hover { border-color: var(--accent); }
  .supplier-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .supplier-avatar { width: 44px; height: 44px; border-radius: 12px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #fff; }
  .supplier-name { font-size: 15px; font-weight: 700; }
  .supplier-cnpj { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .supplier-info { display: flex; flex-direction: column; gap: 6px; }
  .supplier-info-row { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--text2); }

  /* ======= EMPLOYEE ======= */
  .employee-chip { display: flex; align-items: center; gap: 10px; }
  .role-badge { padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .role-admin { background: rgba(79,142,247,.15); color: var(--accent); }
  .role-repositor { background: rgba(56,217,169,.15); color: var(--accent2); }
  .role-vendedor { background: rgba(247,161,79,.15); color: var(--accent3); }
  .role-estoque { background: rgba(180,180,220,.15); color: #aab; }

  /* ======= SALE MODAL ======= */
  .cart-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .cart-total { font-size: 20px; font-weight: 700; color: var(--accent2); font-family: 'Space Grotesk', sans-serif; }

  /* ======= PROFILE ======= */
  .profile-avatar-lg { width: 90px; height: 90px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 700; color: #fff; margin: 0 auto 16px; }
  
  /* ======= FORGOT ======= */
  .back-link { display: flex; align-items: center; gap: 6px; color: var(--text2); font-size: 13px; cursor: pointer; margin-bottom: 20px; }
  .back-link:hover { color: var(--accent); }

  /* ======= RESPONSIVE ======= */
  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    #sidebar { width: 60px; }
    .nav-item span, .sidebar-section, .nav-item .badge { display: none; }
    .nav-item { justify-content: center; }
    #main { padding: 16px; }
  }
  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .login-card { padding: 30px 22px; }
  }
</style>
</head>

  const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}

// ===================== MODAL =====================
function showModal(html) {
  const el = document.createElement('div');
  el.className = 'modal-overlay';
  el.id = 'active-modal';
  el.innerHTML = `<div class="modal">${html}</div>`;
  el.addEventListener('click', e => { if (e.target === el) closeModal(); });
  document.getElementById('modal-container').appendChild(el);
}
function closeModal() {
  const m = document.getElementById('active-modal');
  if (m) m.remove();
}

// ===================== AUTH =====================
function login(email, password) {
  const user = state.users.find(u => u.email === email && u.password === password);
  if (user) {
    state.currentUser = user;
    navigate('dashboard');
    showToast(`Bem-vindo, ${user.name}! 👋`);
    return true;
  }
  showToast('E-mail ou senha incorretos!', 'error');
  return false;
}

function register(name, email, password) {
  if (state.users.find(u => u.email === email)) {
    showToast('E-mail já cadastrado!', 'error');
    return;
  }
  const user = { id: Date.now(), name, email, password, role: 'VENDEDOR', dept: 'LOJA' };
  state.users.push(user);
  state.currentUser = user;
  navigate('dashboard');
  showToast(`Conta criada! Bem-vindo, ${name}!`);
}

function logout() {
  state.currentUser = null;
  navigate('login');
}

// ===================== STOCK =====================
function getStockStatus(p) {
  if (p.stock === 0) return { label: 'Sem Estoque', class: 'badge-empty' };
  if (p.stock < p.minStock) return { label: 'Estoque Baixo', class: 'badge-low' };
  return { label: 'Em Estoque', class: 'badge-ok' };
}

function addProduct(data) {
  const p = { id: Date.now(), ...data, stock: parseInt(data.stock)||0, minStock: parseInt(data.minStock)||0, price: parseFloat(data.price)||0, image: '📦' };
  state.products.push(p);
  showToast('Produto cadastrado!');
  closeModal();
  render();
}

function editProduct(id, data) {
  const idx = state.products.findIndex(p => p.id === id);
  if (idx >= 0) {
    state.products[idx] = { ...state.products[idx], ...data, stock: parseInt(data.stock), minStock: parseInt(data.minStock), price: parseFloat(data.price) };
    showToast('Produto atualizado!');
    closeModal();
    render();
  }
}

function deleteProduct(id) {
  if (!confirm('Excluir produto?')) return;
  state.products = state.products.filter(p => p.id !== id);
  showToast('Produto excluído!', 'warning');
  render();
}

function addSupplier(data) {
  state.suppliers.push({ id: Date.now(), ...data });
  showToast('Fornecedor cadastrado!');
  closeModal();
  render();
}

function deleteSupplier(id) {
  if (!confirm('Excluir fornecedor?')) return;
  state.suppliers = state.suppliers.filter(s => s.id !== id);
  showToast('Fornecedor excluído!', 'warning');
  render();
}

function addEmployee(data) {
  state.users.push({ id: Date.now(), ...data });
  showToast('Funcionário cadastrado!');
  closeModal();
  render();
}

function deleteEmployee(id) {
  if (id === state.currentUser?.id) { showToast('Não pode excluir sua própria conta!', 'error'); return; }
  if (!confirm('Excluir funcionário?')) return;
  state.users = state.users.filter(u => u.id !== id);
  showToast('Funcionário removido!', 'warning');
  render();
}

function registerSale() {
  if (state.saleCart.length === 0) { showToast('Carrinho vazio!', 'error'); return; }
  // Deduct stock
  for (const item of state.saleCart) {
    const p = state.products.find(p => p.id === item.id);
    if (p) {
      if (p.stock < item.qty) { showToast(`Estoque insuficiente: ${p.name}`, 'error'); return; }
      p.stock -= item.qty;
    }
  }
  const total = state.saleCart.reduce((s, i) => s + i.price * i.qty, 0);
  state.sales.push({ id: `#${Date.now()}`, date: new Date().toLocaleDateString('pt-BR'), items: [...state.saleCart], total, status: 'Concluída' });
  state.saleCart = [];
  showToast(`Venda registrada! Total: R$ ${total.toFixed(2)}`);
  closeModal();
  render();
}

}

function bindLoginEvents() {
  // Tabs
  document.querySelectorAll('#login-tabs button').forEach(btn => {

      btn.classList.add('active');
      const tab = btn.dataset.tab;
      ['signin','signup','forgot'].forEach(t => {
        const el = document.getElementById(`tab-${t}`);
        if (el) el.classList.toggle('hidden', t !== tab);
      });
    });
  });
  document.getElementById('btn-login')?.addEventListener('click', () => {
    login(document.getElementById('l-email').value, document.getElementById('l-pass').value);
  });
  document.getElementById('l-pass')?.addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('btn-login').click(); });
  document.getElementById('btn-register')?.addEventListener('click', () => {
    register(document.getElementById('r-name').value, document.getElementById('r-email').value, document.getElementById('r-pass').value);
  });
  document.getElementById('btn-forgot')?.addEventListener('click', () => {

    if (email) showToast('Instruções enviadas para ' + email);
    else showToast('Informe seu e-mail!', 'error');
  });

    { section: 'CADASTROS' },
    { id: 'novo-produto', icon: '➕', label: 'Novo Produto' },
    { id: 'fornecedores', icon: '🏭', label: 'Fornecedores' },
    { id: 'colaboradores', icon: '👥', label: 'Colaboradores' },
    { id: 'divider' },
    { id: 'perfil', icon: '👤', label: 'Meu Perfil' },
    { id: 'logout-btn', icon: '🚪', label: 'Sair', special: 'logout' },
  ];
  let html = '<div id="sidebar">';
  for (const p of pages) {
    if (p.divider !== undefined || p.id === 'divider') { html += '<div class="sidebar-divider"></div>'; continue; }
    if (p.section) { html += `<div class="sidebar-section">${p.section}</div>`; continue; }
    const active = state.currentPage === p.id ? 'active' : '';
    const badge = p.badge ? `<span class="badge">${p.badge}</span>` : '';
    const onclick = p.special === 'logout' ? `logout()` : `navigate('${p.id}')`;
    html += `<div class="nav-item ${active}" onclick="${onclick}"><span class="icon">${p.icon}</span><span>${p.label}</span>${badge}</div>`;
  }
  html += '</div>';
  return html;
}

function switchTab(btn, tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.add('hidden'));
  document.getElementById(tabId)?.classList.remove('hidden');
}

          cart.map(item => `

              <div class="fw-600" style="font-size:13px;">${item.name}</div>

              <button class="icon-btn" onclick="changeCartQty(${item.id},-1)" style="width:26px;height:26px;font-size:12px;">−</button>
              <span class="fw-600">${item.qty}</span>
              <button class="icon-btn" onclick="changeCartQty(${item.id},1)" style="width:26px;height:26px;font-size:12px;">+</button>
              <button class="icon-btn danger" onclick="removeFromCart(${item.id})" style="width:26px;height:26px;font-size:12px;">✕</button>
            </div>
          </div>`).join('')}
      </div>
      ${cart.length > 0 ? `

        <button class="btn btn-ghost w-full" style="justify-content:center;margin-top:8px;" onclick="state.saleCart=[];renderInPlace('vendas')">🗑️ Limpar</button>
      </div>` : ''}
    </div>
  </div>`;
}

function addToCart(productId) {
  const p = state.products.find(p=>p.id===productId);
  if (!p) return;
  const existing = state.saleCart.find(i=>i.id===productId);
  if (existing) {
    if (existing.qty >= p.stock) { showToast('Quantidade máxima!','warning'); return; }
    existing.qty++;
  } else {
    state.saleCart.push({ id: p.id, name: p.name, price: p.price, qty: 1, maxQty: p.stock });
  }
  renderInPlace('vendas');
}

function removeFromCart(id) {
  state.saleCart = state.saleCart.filter(i=>i.id!==id);
  renderInPlace('vendas');
}

function changeCartQty(id, delta) {
  const item = state.saleCart.find(i=>i.id===id);
  const p = state.products.find(p=>p.id===id);
  if (!item || !p) return;
  item.qty = Math.max(1, Math.min(p.stock, item.qty + delta));
  renderInPlace('vendas');
}

          <div class="form-group"><label>Confirmar Senha</label><input class="input" type="password" id="pw-conf" placeholder="••••••••"></div>
          <button class="btn btn-orange" onclick="
            const old = document.getElementById('pw-old').value;
            const nw = document.getElementById('pw-new').value;
            const cf = document.getElementById('pw-conf').value;
            if(old !== state.currentUser.password) { showToast('Senha atual incorreta!','error'); return; }
            if(nw !== cf) { showToast('Senhas não conferem!','error'); return; }
            if(nw.length < 6) { showToast('Senha muito curta!','error'); return; }
            const u = state.users.find(u=>u.id===state.currentUser.id);
            if(u) u.password = nw;
            state.currentUser.password = nw;
            showToast('Senha alterada!');
          ">🔒 Alterar Senha</button>
        </div>
      </div>
    </div>
  </div>`;
}

function openEditProductModal(id) {

  showModal(`
    <div class="modal-header">
      <h3>✏️ Editar: ${p.name}</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Nome</label><input class="input" id="e-name" value="${p.name}"></div>
        <div class="form-group"><label>SKU</label><input class="input" id="e-sku" value="${p.sku}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Preço (R$)</label><input class="input" id="e-price" type="number" step="0.01" value="${p.price}"></div>
        <div class="form-group"><label>Categoria</label>
          <select class="input select" id="e-cat">
            ${state.categories.map(c=>`<option ${p.category===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Estoque Atual</label><input class="input" id="e-stock" type="number" value="${p.stock}"></div>
        <div class="form-group"><label>Estoque Mínimo</label><input class="input" id="e-minstock" type="number" value="${p.minStock}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Unidade</label>
          <select class="input select" id="e-unit">
            ${['KG','G','UN','L','ML','CX'].map(u=>`<option ${p.unit===u?'selected':''}>${u}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label>Fornecedor</label>
          <select class="input select" id="e-supplier">
            <option value="">Selecione...</option>
            ${state.suppliers.map(s=>`<option value="${s.id}" ${p.supplier===s.id?'selected':''}>${s.name}</option>`).join('')}
          </select>

      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="editProduct(${id},{
        name:document.getElementById('e-name').value,

        price:document.getElementById('e-price').value,

        minStock:document.getElementById('e-minstock').value,
        unit:document.getElementById('e-unit').value,
        supplier:parseInt(document.getElementById('e-supplier').value)||0,
        image:'${p.image}'
      })">💾 Atualizar</button>
    </div>`);
}

// ===================== BIND EVENTS =====================
function bindMainEvents() {
  // keyboard nav - Enter on search
  document.querySelectorAll('.input').forEach(inp => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter' && inp.closest('.search-box')) renderInPlace(state.currentPage);
    });
  });
}
